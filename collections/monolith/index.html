<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Monolith by ECNA: limited pieces shaped by pressure and restraint."
    />
    <title>ECNA / MONOLITH COLLECTION</title>
    <link rel="stylesheet" href="../../styles.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="../../assets/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="../../assets/favicon.png" />
  </head>
  <body>
    <div class="custom-cursor" aria-hidden="true">
      <div class="custom-cursor__dot"></div>
      <div class="custom-cursor__ring"></div>
    </div>
    <a class="site-mark" href="../../index.html" aria-label="ECNA">ECNA</a>
    <button class="collection-toggle" type="button" aria-expanded="false" aria-controls="collection-menu">
      MENU
    </button>
    <div class="collection-overlay" id="collection-menu" aria-hidden="true">
      <div class="collection-scrim" data-menu-close></div>
      <aside class="collection-drawer" role="dialog" aria-modal="true" aria-label="Menu">
        <button class="collection-close" type="button" aria-label="Close menu">X</button>
        <nav class="collection-nav" aria-label="Menu">
          <div class="collection-nav__group">
            <button class="collection-nav__trigger" type="button" aria-expanded="false" aria-controls="collection-submenu">
              COLLECTIONS
            </button>
            <div class="collection-subnav" id="collection-submenu" data-collection-subnav data-path-prefix="../../" hidden></div>
          </div>
          <a href="../../about/index.html">ABOUT</a>
          <a href="../../connect.html">CONNECT</a>
        </nav>
      </aside>
    </div>
    <main class="collection-page" aria-label="ECNA MONOLITH COLLECTION">
      <section class="collection-hero">
        <p>COLLECTION</p>
        <h1>Monolith</h1>
        <span>Limited pieces shaped by pressure and restraint.</span>
      </section>

      <section class="collection-product-grid" aria-label="Monolith limited pieces">
        <a class="collection-product" href="../../monolith.html">
          <figure>
            <img src="../../assets/ecna-monolith-reference.jpeg" alt="Monolith sofa in dark directional light." />
          </figure>
          <div class="collection-product__meta">
            <h2>Monolith Sofa</h2>
            <p>Edition of 5</p>
          </div>
        </a>

        <a class="collection-product" href="../../monolith.html">
          <figure>
            <img src="../../assets/ecna-home-portal-showroom.png" alt="Monolith lounge chair in a dark architectural showroom." />
          </figure>
          <div class="collection-product__meta">
            <h2>Monolith Chair</h2>
            <p>Edition of 5</p>
          </div>
        </a>

        <a class="collection-product" href="../../monolith.html">
          <figure>
            <img src="../../assets/ecna-gallery-reference.png" alt="Monolith table and seating in a quiet gallery scene." />
          </figure>
          <div class="collection-product__meta">
            <h2>Monolith Table</h2>
            <p>Edition of 5</p>
          </div>
        </a>

        <a class="collection-product" href="../../monolith.html">
          <figure>
            <img src="../../assets/ecna-home-monolith-product.jpeg" alt="Monolith object in a minimal dark composition." />
          </figure>
          <div class="collection-product__meta">
            <h2>Monolith Object</h2>
            <p>Edition of 5</p>
          </div>
        </a>
      </section>
    </main>
    <script src="../../main.js"></script>
  </body>
</html>
