<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="FLOW by ECNA: a sculptural chaise defined by mass, light, and spatial tension."
    />
    <title>ECNA / FLOW</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <button class="collection-toggle" type="button" aria-expanded="false" aria-controls="collection-menu">
      MENU
    </button>
    <div class="collection-overlay" id="collection-menu" aria-hidden="true">
      <nav class="collection-nav" aria-label="Collection">
        <a href="monolith.html">MONOLITH</a>
        <a href="flow.html">FLOW</a>
      </nav>
    </div>
    <main class="flow-page" aria-label="ECNA FLOW">
      <section class="flow-scene flow-scene--hero" data-scene>
        <img
          class="flow-scene__image"
          src="assets/ecna-flow-final-object.png"
          alt="The ECNA FLOW sculptural chaise lounge held in a dark architectural interior."
        />
        <div class="flow-scene__copy">
          <p class="flow-scene__label">01</p>
          <h1>OBJECT</h1>
        </div>
      </section>

      <section class="flow-scene flow-scene--set" data-scene>
        <img
          class="flow-scene__image"
          src="assets/ecna-flow-final-presence.png"
          alt="The ECNA FLOW chaise with a human lying quietly on it."
        />
        <div class="flow-scene__copy">
          <p class="flow-scene__label">02</p>
          <h2>PRESENCE</h2>
        </div>
      </section>

      <section class="flow-scene flow-scene--detail" data-scene>
        <img
          class="flow-scene__image"
          src="assets/ecna-flow-origin.png"
          alt="A close study of the ECNA FLOW material, curvature, and sculptural surface."
        />
        <div class="flow-scene__copy">
          <p class="flow-scene__label">03</p>
          <h2>DETAIL</h2>
        </div>
      </section>
    </main>
    <script src="main.js"></script>
  </body>
</html>
