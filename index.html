<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ECNA constructs presence through monolithic spatial objects."
    />
    <title>ECNA</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="experience" aria-label="ECNA spatial experience">
      <section class="scene scene--hero" data-scene>
        <div class="scene__space hero">
          <img
            class="hero__image"
            src="assets/ecna-monolith-reference.jpeg"
            alt="A monolithic black ECNA sofa isolated in a dark room with directional light."
          />
          <header class="site-mark" aria-label="ECNA">ECNA</header>
          <p class="scene__index">01</p>
          <h1 class="hero__title">
            <span>PRESENCE</span>
            <span>OVER FUNCTION</span>
          </h1>
          <p class="hero__caption">mass held in silence</p>
        </div>
      </section>

      <section class="scene scene--set" data-scene>
        <div class="scene__space set">
          <img
            class="set__image"
            src="assets/ecna-gallery-reference.png"
            alt="A dark gallery composition with ECNA sofa, chair, and table."
          />
          <p class="scene__index">02</p>
          <div class="set__text">
            <h2>Objects in Dialogue</h2>
            <p>A composition of mass, tension, and silence.</p>
          </div>
        </div>
      </section>

      <section class="scene scene--threshold" data-scene>
        <div class="scene__space threshold">
          <img
            class="threshold__image"
            src="assets/ecna-gallery-reference.png"
            alt="ECNA objects resting in a dark gallery environment."
          />
          <p class="scene__index">03</p>
          <div class="threshold__content">
            <p class="threshold__eyebrow">Enter by object</p>
            <nav class="object-list" aria-label="ECNA objects">
              <a href="monolith.html">
                <span>MONOLITH</span>
                <small>sofa</small>
              </a>
              <a href="facet.html">
                <span>FACET</span>
                <small>chair</small>
              </a>
              <a href="plane.html">
                <span>PLANE</span>
                <small>table</small>
              </a>
            </nav>
          </div>
        </div>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
