    <meta name="twitter:card" content="summary_large_image" />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">

    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  </head>
  <body>
    <div class="custom-cursor" aria-hidden="true">
      <div class="custom-cursor__dot"></div>
      <div class="custom-cursor__ring"></div>
    </div>
    <a class="site-mark" href="index.html" aria-label="ECNA">ECNA</a>
    <button class="collection-toggle" type="button" aria-expanded="false" aria-controls="collection-menu">
      MENU
    </button>
    <div class="collection-overlay" id="collection-menu" aria-hidden="true">
      <div class="collection-scrim" data-menu-close></div>
      <aside class="collection-drawer" role="dialog" aria-modal="true" aria-label="Menu">
        <button class="collection-close" type="button" aria-label="Close menu">X</button>
        <nav class="collection-nav" aria-label="Menu">
          <div class="collection-nav__group">
            <button class="collection-nav__trigger" type="button" aria-expanded="false" aria-controls="collection-submenu">
              COLLECTIONS
            </button>
            <div class="collection-subnav" id="collection-submenu" hidden>
              <a href="monolith.html">MONOLITH</a>
              <a href="tide.html">ARC</a>
              <a href="core.html">CORE</a>
              <a href="leviathan.html">UMBRA</a>
              <a href="flow.html">EON</a>
              <a href="nox.html">NOX</a>
            </div>
          </div>
          <a href="about/index.html">ABOUT</a>
          <a href="connect.html">CONNECT</a>
        </nav>
      </aside>
    </div>
    <main class="experience experience--landing" aria-label="ECNA spatial experience">
      <section class="scene scene--hero" data-scene>
        <div class="scene__space hero">
          <video
            class="hero__image"
            src="assets/ecna-home-hero.mp4"
            autoplay
            muted
            loop
            playsinline
            preload="auto"
            aria-label="ECNA cinematic brand film."
          ></video>
          <p class="hero__caption">
            ECNA<br />
            OBJECTS THAT HOLD SPACE.
          </p>
        </div>
      </section>

      <section class="scene scene--monolith-cave">
        <div class="scene__media">
          <img src="assets/ecna-home-section-2-cave.png" alt="A sculptural form inside a dark cave with falling water." />
        </div>

        <div class="scene__content">
          <p class="scene__body">
            BORN WHERE STONE MEETS SILENCE.
          </p>

          <p class="scene__note">
            NOT PLACED.<br />
            DISCOVERED.
          </p>
        </div>
      </section>

      <section class="scene scene--monolith-transition" data-scene>
        <img
          class="monolith-transition__image"
          src="assets/ecna-home-section-3-raw.png"
          alt="An ECNA sculptural object within raw stone and concrete architecture."
        />

        <div class="monolith-transition__content">
          <p class="monolith-transition__body">
            NOT DESIGNED.<br />
            UNEARTHED.
          </p>
          <p class="monolith-transition__note">
            SHAPED BY PRESSURE, TIME, AND RESTRAINT.
          </p>
        </div>
      </section>

      <a class="scene scene--portal" href="monolith.html" data-scene aria-label="Open Monolith page">
        <span class="portal__media" aria-hidden="true">
          <img src="assets/ecna-home-portal-showroom.png" alt="" loading="lazy" />
        </span>
        <span class="portal__overlay" aria-hidden="true"></span>
        <span class="portal__vignette" aria-hidden="true"></span>
        <span class="portal__light" aria-hidden="true"></span>
        <span class="portal__grain" aria-hidden="true"></span>
        <span class="portal__content">
          <span>MONOLITH</span>
          <small>ENTER COLLECTION</small>
        </span>
        <span class="portal__fade" aria-hidden="true"></span>
      </a>
    </main>

    <script src="main.js"></script>
  </body>
