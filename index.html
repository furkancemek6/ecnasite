<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ECNA constructs presence through monolithic spatial objects."
    />
    <title>ECNA</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="site-mark" href="index.html" aria-label="ECNA">ECNA</a>
    <button class="collection-toggle" type="button" aria-expanded="false" aria-controls="collection-menu">
      MENU
    </button>
    <div class="collection-overlay" id="collection-menu" aria-hidden="true">
      <nav class="collection-nav" aria-label="Collection">
        <a href="monolith.html">MONOLITH</a>
        <a href="flow.html">FLOW</a>
      </nav>
    </div>
    <main class="experience experience--landing" aria-label="ECNA spatial experience">
      <section class="scene scene--hero" data-scene>
        <div class="scene__space hero">
          <img
            class="hero__image"
            src="assets/ecna-monolith-reference.jpeg"
            alt="A monolithic black ECNA sofa isolated in a dark room with directional light."
          />
          <p class="hero__caption">
            Form holds the room.
          </p>
        </div>
      </section>

      <section class="scene scene--presence" data-scene>
        <div class="scene__space presence">
          <img
            class="set__image"
            src="assets/ecna-monolith-reference.jpeg"
            alt="The ECNA monolith sofa held in a quiet cinematic interior."
          />
          <p class="hero__caption">
            Weight. Balance. Silence.
          </p>
        </div>
      </section>

      <section class="scene scene--detail" data-scene>
        <div class="scene__space detail">
          <img
            class="threshold__image"
            src="assets/ecna-monolith-reference.jpeg"
            alt="A close view of the ECNA monolith material, geometry, and shadow."
          />
          <p class="hero__caption">
            Material defines presence.
          </p>
        </div>
      </section>

      <section class="scene scene--collection" data-scene>
        <div class="scene__space collection-entry-scene">
          <img
            class="threshold__image"
            src="assets/ecna-monolith-reference.jpeg"
            alt="A close material view of the ECNA monolith form."
          />
          <button class="collection-entry" type="button" aria-expanded="false" aria-controls="collection-menu">
            COLLECTION
          </button>
        </div>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
