<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ECNA LEVIATHAN: a silent mass of control shaped for dark architectural space."
    />
    <title>ECNA / LEVIATHAN</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="assets/favicon.png" />
  </head>
  <body>
    <div class="custom-cursor" aria-hidden="true">
      <div class="custom-cursor__dot"></div>
      <div class="custom-cursor__ring"></div>
    </div>
    <a class="site-mark" href="index.html" aria-label="ECNA">ECNA</a>
    <button class="collection-toggle" type="button" aria-expanded="false" aria-controls="collection-menu">
      MENU
    </button>
    <div class="collection-overlay" id="collection-menu" aria-hidden="true">
      <div class="collection-scrim" data-menu-close></div>
      <aside class="collection-drawer" role="dialog" aria-modal="true" aria-label="Menu">
        <button class="collection-close" type="button" aria-label="Close menu">X</button>
        <nav class="collection-nav" aria-label="Menu">
          <div class="collection-nav__group">
            <button class="collection-nav__trigger" type="button" aria-expanded="false" aria-controls="collection-submenu">
              COLLECTIONS
            </button>
            <div class="collection-subnav" id="collection-submenu" hidden>
              <a href="monolith.html">MONOLITH</a>
              <a href="tide.html">TIDE</a>
              <a href="leviathan.html">LEVIATHAN</a>
              <a href="flow.html">FLOW</a>
              <a href="nox.html">NOX</a>
            </div>
          </div>
          <a href="about/index.html">ABOUT</a>
          <a href="connect.html">CONNECT</a>
        </nav>
      </aside>
    </div>

    <main class="leviathan-page" aria-label="ECNA LEVIATHAN Collection">
      <section class="leviathan-scene leviathan-scene--hero" data-scene>
        <img
          class="leviathan-scene__image"
          src="assets/ecna-leviathan-main.png"
          alt="LEVIATHAN sculptural sofa in a dark gallery under directional light."
        />
        <div class="leviathan-scene__content">
          <h1>LEVIATHAN</h1>
          <p>Presence, overwhelming.</p>
        </div>
      </section>

      <section class="leviathan-scene leviathan-scene--detail" aria-label="LEVIATHAN material and curve detail">
        <img
          class="leviathan-scene__image"
          src="assets/ecna-leviathan-detail.png"
          alt="Close detail of LEVIATHAN material texture and curved form."
          loading="lazy"
        />
        <div class="leviathan-scene__content leviathan-scene__content--small">
          <p>
            Material absorbs light.<br />
            Form defines shadow.
          </p>
        </div>
      </section>

      <section class="leviathan-scene leviathan-scene--set" aria-label="LEVIATHAN sofa and armchair together">
        <img
          class="leviathan-scene__image"
          src="assets/ecna-leviathan-set.jpeg"
          alt="LEVIATHAN sofa and armchair together in a dark architectural room."
          loading="lazy"
        />
        <div class="leviathan-scene__content leviathan-scene__content--small">
          <p>
            Weight without movement.<br />
            Stillness with force.
          </p>
        </div>
      </section>

      <section class="leviathan-scene leviathan-scene--chair" aria-label="LEVIATHAN armchair">
        <img
          class="leviathan-scene__image"
          src="assets/ecna-leviathan-chair.png"
          alt="LEVIATHAN armchair alone under a quiet spotlight."
          loading="lazy"
        />
        <div class="leviathan-scene__content leviathan-scene__content--small">
          <p>
            It does not follow space.<br />
            It defines it.
          </p>
          <a class="collection-inquire" href="connect.html">Inquire</a>
        </div>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
