<!doctype html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      content="MONOLITH by ECNA: a sculptural black sofa defined by mass, edge, and spatial presence."

    <link rel="stylesheet" href="styles.css" />

  <body>
    <a class="site-mark" href="index.html" aria-label="ECNA">ECNA</a>
