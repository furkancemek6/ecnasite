<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="MONOLITH by ECNA: a sculptural black sofa defined by mass, edge, and spatial presence."
    />
    <title>ECNA / MONOLITH</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="assets/favicon.png" />
  </head>
  <body>
    <div class="custom-cursor" aria-hidden="true">
      <div class="custom-cursor__dot"></div>
      <div class="custom-cursor__ring"></div>
    </div>
    <a class="site-mark" href="index.html" aria-label="ECNA">ECNA</a>
    <button class="collection-toggle" type="button" aria-expanded="false" aria-controls="collection-menu">
      MENU
    </button>
    <div class="collection-overlay" id="collection-menu" aria-hidden="true">
      <div class="collection-scrim" data-menu-close></div>
      <aside class="collection-drawer" role="dialog" aria-modal="true" aria-label="Menu">
        <button class="collection-close" type="button" aria-label="Close menu">X</button>
        <nav class="collection-nav" aria-label="Menu">
          <div class="collection-nav__group">
            <button class="collection-nav__trigger" type="button" aria-expanded="false" aria-controls="collection-submenu">
              COLLECTIONS
            </button>
            <div class="collection-subnav" id="collection-submenu" data-collection-subnav data-path-prefix="" hidden></div>
          </div>
          <a href="about/index.html">ABOUT</a>
          <a href="connect.html">CONNECT</a>
        </nav>
      </aside>
    </div>
    <main class="monolith-page" aria-label="ECNA MONOLITH">
      <section class="monolith-section monolith-section--object" data-scene>
        <img
          class="monolith-section__image"
          src="assets/ecna-monolith-reference.jpeg"
          alt="The ECNA MONOLITH sofa isolated in dark directional light."
        />
        <div class="monolith-section__copy">
          <p class="monolith-section__label">01</p>
          <h1>PURE PRESENCE.</h1>
        </div>
      </section>

      <section class="monolith-section monolith-section--set" data-scene>
        <img
          class="monolith-section__image"
          src="assets/ecna-gallery-reference.png"
          alt="The ECNA MONOLITH set with sofa, chair, and table in a dark room."
        />
        <div class="monolith-section__copy">
          <p class="monolith-section__label">02</p>
          <h2>QUIET. STRONG. STILL.</h2>
        </div>
      </section>

      <section class="monolith-section monolith-section--detail" data-scene>
        <img
          class="monolith-section__image"
          src="assets/ecna-monolith-reference.jpeg"
          alt="A close view of the ECNA MONOLITH surface, edge, and shadow."
        />
        <div class="monolith-section__copy">
          <p class="monolith-section__label">03</p>
          <h2>MADE TO HOLD SPACE.</h2>
        </div>
      </section>
    </main>
    <script src="main.js"></script>
  </body>
</html>
