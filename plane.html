<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="PLANE by ECNA: a low monolithic table defined by horizontal mass and architectural tension."
    />
    <title>ECNA / PLANE</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="product-page">
      <section
        class="product-hero"
        style="
          --focus-x: 43%;
          --focus-y: 75%;
          --scale: 1.28;
          --mobile-focus-x: 45%;
          --mobile-focus-y: 72%;
          --mobile-scale: 1.82;
        "
      >
        <img
          class="product-hero__image"
          src="assets/ecna-gallery-reference.png"
          alt="The ECNA PLANE table resting low in a dark gallery scene."
        />
        <div class="product-meta">
          <a href="index.html">ECNA</a>
          <span>PLANE</span>

        <div class="product-copy">
          <h1>PLANE</h1>
          <p>
            A grounded horizontal mass. Its surface is quiet, its edges abrupt,

          </p>

      </section>

    <script src="main.js"></script>
